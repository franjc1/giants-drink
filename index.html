<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two Fires</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }

  #level-select {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #fff;
    font-family: monospace;
    z-index: 10;
  }
  #level-select h1 {
    font-size: 28px;
    letter-spacing: 4px;
    margin-bottom: 8px;
    color: #FCE4A0;
  }
  #level-select p {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 16px;
  }
  #level-select button {
    background: #111;
    color: #fff;
    border: 1px solid #555;
    font-family: monospace;
    font-size: 15px;
    padding: 12px 32px;
    cursor: pointer;
    width: 360px;
    text-align: left;
  }
  #level-select button:hover {
    background: #222;
    border-color: #FCE4A0;
    color: #FCE4A0;
  }
  #level-select .hint {
    font-size: 11px;
    color: #555;
    margin-top: 16px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="level-select">
  <h1>TWO FIRES</h1>
  <p>Select a level to play</p>
  <button data-level="data/test-fixtures/episode1.json">Episode 1 — Mushroom Grasslands</button>
  <button data-level="data/test-fixtures/episode2.json">Episode 2 — The Iron Caves</button>
  <p class="hint">Or use ?level=path/to/fixture.json to load directly</p>
</div>

<script type="module" src="src/game-loop.js"></script>
</body>
</html>
