<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two Fires — Episode 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c" width="800" height="480"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 800, H = 480;
const TILE = 16;
const MAP_W = 210, MAP_H = 15;

let episode = null;
let tilemap = null;   // Uint8Array, row-major
let tileset = null;   // int id → {color, collision}
let player = null;
let entities = [];
const keys = {};
let cameraX = 0;

// ── Input ──────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))
    e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Tilemap helpers ────────────────────────────────────────────────────────
function getTile(col, row) {
  if (col < 0 || col >= MAP_W || row < 0) return 0;
  if (row >= MAP_H) return 1; // below map = solid
  return tilemap[row * MAP_W + col];
}
function isSolid(id) {
  return tileset[id] && tileset[id].collision === true;
}

// ── Move + tile collision ──────────────────────────────────────────────────
// Applies vx, resolves X, applies vy, resolves Y. Sets obj.onGround.
// obj.onWall is set if horizontal collision occurred (for enemy AI).
function moveAndCollide(obj) {
  // X
  obj.x += obj.vx;
  {
    const cl = Math.floor(obj.x / TILE);
    const cr = Math.floor((obj.x + obj.w - 1) / TILE);
    const rt = Math.floor(obj.y / TILE);
    const rb = Math.floor((obj.y + obj.h - 1) / TILE);
    if (obj.vx > 0) {
      for (let r = rt; r <= rb; r++) {
        if (isSolid(getTile(cr, r))) {
          obj.x = cr * TILE - obj.w;
          obj.vx = 0;
          if ('onWall' in obj) obj.onWall = true;
          break;
        }
      }
    } else if (obj.vx < 0) {
      for (let r = rt; r <= rb; r++) {
        if (isSolid(getTile(cl, r))) {
          obj.x = (cl + 1) * TILE;
          obj.vx = 0;
          if ('onWall' in obj) obj.onWall = true;
          break;
        }
      }
    }
  }

  // Y
  obj.y += obj.vy;
  obj.onGround = false;
  {
    const cl = Math.floor(obj.x / TILE);
    const cr = Math.floor((obj.x + obj.w - 1) / TILE);
    const rt = Math.floor(obj.y / TILE);
    const rb = Math.floor((obj.y + obj.h - 1) / TILE);
    if (obj.vy >= 0) {
      for (let c = cl; c <= cr; c++) {
        if (isSolid(getTile(c, rb))) {
          obj.y = rb * TILE - obj.h;
          obj.vy = 0;
          obj.onGround = true;
          break;
        }
      }
    } else {
      for (let c = cl; c <= cr; c++) {
        if (isSolid(getTile(c, rt))) {
          obj.y = (rt + 1) * TILE;
          obj.vy = 0;
          break;
        }
      }
    }
  }
}

// ── Player update ──────────────────────────────────────────────────────────
const COYOTE_FRAMES = 5;

function updatePlayer() {
  const ph = episode.episode.physics;
  const leftHeld = keys['ArrowLeft']  || keys['KeyA'];
  const rightHeld = keys['ArrowRight'] || keys['KeyD'];
  const jumpHeld  = keys['Space'] || keys['ArrowUp'];

  // Horizontal
  const accel = ph.run_acceleration * (player.onGround ? 1.0 : ph.air_control);
  if (rightHeld) {
    player.vx = Math.min(player.vx + accel, ph.run_speed);
  } else if (leftHeld) {
    player.vx = Math.max(player.vx - accel, -ph.run_speed);
  } else {
    const fric = player.onGround ? ph.friction_ground : ph.friction_air;
    player.vx *= fric;
    if (Math.abs(player.vx) < 0.05) player.vx = 0;
  }

  // Jump: trigger on fresh press only
  const jumpPressed = jumpHeld && !player.prevJumpHeld;
  if (jumpPressed && (player.onGround || player.coyote > 0)) {
    player.vy = ph.jump_velocity;
    player.holdFrames = 10;
    player.onGround = false;
    player.coyote = 0;
  }
  // Variable height: extra force while held and ascending
  if (jumpHeld && player.holdFrames > 0 && player.vy < 0) {
    player.vy += ph.jump_hold_bonus / 10;
    player.holdFrames--;
  }
  if (!jumpHeld) player.holdFrames = 0;
  player.prevJumpHeld = jumpHeld;

  // Gravity
  player.vy = Math.min(player.vy + ph.gravity, ph.max_fall_speed);

  // Coyote
  if (player.onGround) player.coyote = COYOTE_FRAMES;
  else if (player.coyote > 0) player.coyote--;

  // Left world boundary
  player.x = Math.max(0, player.x);

  moveAndCollide(player);

  // Fell into pit
  if (player.y > MAP_H * TILE + 32) respawnPlayer();
}

function respawnPlayer() {
  const ps = episode.player.position;
  player.x = ps.x; player.y = ps.y;
  player.vx = 0;   player.vy = 0;
  player.coyote = 0; player.holdFrames = 0;
}

// ── Entity update ──────────────────────────────────────────────────────────
function updateEntities() {
  const ph = episode.episode.physics;

  for (const e of entities) {
    if (!e.alive) continue;

    e.vy = Math.min((e.vy || 0) + ph.gravity, ph.max_fall_speed);
    e.onWall = false;
    moveAndCollide(e);

    // Reverse at patrol limits or walls
    if (e.onWall || e.x <= e.patrolMin) e.vx =  e.speed;
    if (e.x + e.w >= e.patrolMax)       e.vx = -e.speed;

    if (e.y > MAP_H * TILE + 32) { e.alive = false; continue; }

    // Player AABB
    if (player.x < e.x + e.w && player.x + player.w > e.x &&
        player.y < e.y + e.h && player.y + player.h > e.y) {
      // Stomp: player falling, feet above enemy midpoint
      if (player.vy > 0 && player.y + player.h < e.y + e.h * 0.6) {
        e.alive = false;
        player.vy = -7;
      } else {
        respawnPlayer();
      }
    }
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  // Camera: smooth follow
  const target = player.x - W * 0.35;
  cameraX += (target - cameraX) * 0.15;
  cameraX = Math.max(0, Math.min(cameraX, MAP_W * TILE - W));

  // Sky
  ctx.fillStyle = '#5C94FC';
  ctx.fillRect(0, 0, W, H);

  // Tilemap
  const c0 = Math.max(0, Math.floor(cameraX / TILE));
  const c1 = Math.min(MAP_W - 1, Math.ceil((cameraX + W) / TILE));

  for (let row = 0; row < MAP_H; row++) {
    const sy = row * TILE;
    for (let col = c0; col <= c1; col++) {
      const id = tilemap[row * MAP_W + col];
      if (id === 0) continue;
      const t = tileset[id];
      if (!t) continue;
      const sx = Math.round(col * TILE - cameraX);
      ctx.fillStyle = t.color;
      ctx.fillRect(sx, sy, TILE, TILE);
      // Light border to distinguish adjacent same-color tiles
      if (t.collision) {
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);
      }
    }
  }

  // Entities
  for (const e of entities) {
    if (!e.alive) continue;
    const ex = Math.round(e.x - cameraX);
    const ey = Math.round(e.y);
    ctx.fillStyle = e.color;
    ctx.fillRect(ex, ey, e.w, e.h);
    // Simple eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(ex + 2, ey + 3, 3, 3);
    ctx.fillRect(ex + e.w - 5, ey + 3, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(ex + 3, ey + 4, 2, 2);
    ctx.fillRect(ex + e.w - 4, ey + 4, 2, 2);
  }

  // Player (red figure)
  const px = Math.round(player.x - cameraX);
  const py = Math.round(player.y);
  // Body
  ctx.fillStyle = '#CC2200';
  ctx.fillRect(px, py + 10, player.w, player.h - 10);
  // Head
  ctx.fillStyle = '#FFAA80';
  ctx.fillRect(px + 2, py + 4, player.w - 4, 8);
  // Hat
  ctx.fillStyle = '#CC2200';
  ctx.fillRect(px, py, player.w, 6);
  ctx.fillRect(px - 1, py + 4, player.w + 2, 3);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(px + player.w - 5, py + 6, 2, 2);

  // HUD bar
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, 210, 22);
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('← → move   SPACE / ↑ jump', 8, 15);
}

// ── Game loop ──────────────────────────────────────────────────────────────
function loop() {
  if (episode) {
    updatePlayer();
    updateEntities();
    render();
  }
  requestAnimationFrame(loop);
}

// ── Load + init ────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('data/test-fixtures/episode1.json');
  if (!res.ok) throw new Error(`HTTP ${res.status} loading episode1.json`);
  episode = await res.json();

  // Tileset
  const rawTiles = episode.episode.spatial.layers[0].tileset_spec.tiles;
  tileset = {};
  for (const [k, v] of Object.entries(rawTiles)) {
    tileset[parseInt(k)] = { color: v.color, collision: v.collision === true };
  }

  // Build tilemap from base64_uint8
  const layer0 = episode.episode.spatial.layers[0];
  const b64 = layer0.data;
  const binary = atob(b64);
  tilemap = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) tilemap[i] = binary.charCodeAt(i);

  // Player
  const ps = episode.player.position;
  player = {
    x: ps.x, y: ps.y,
    vx: 0, vy: 0,
    w: 16, h: 24,
    onGround: false,
    coyote: 0,
    holdFrames: 0,
    prevJumpHeld: false,
  };

  // Entities from entity_placements
  entities = episode.episode.entity_placements
    .filter(p => p.active)
    .map(p => {
      const ent = episode.world.entities[p.entity_id];
      const [ew, eh] = ent.asset_spec.visual.dimensions;
      const speed = ent.behavioral_params.patrol_speed;
      const range = ent.behavioral_params.patrol_range;
      return {
        id: p.entity_id,
        x: p.position.x, y: p.position.y,
        vx: -speed, vy: 0,
        w: ew, h: eh,
        speed,
        patrolMin: p.position.x - range,
        patrolMax: p.position.x + range,
        onGround: false,
        onWall: false,
        alive: true,
        color: ent.faction_id === 'goomba_union' ? '#7B4A1E' : '#2D6A2D',
      };
    });

  requestAnimationFrame(loop);
}

init().catch(err => {
  ctx.fillStyle = '#5C94FC';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Failed to load episode1.json', W / 2, H / 2 - 12);
  ctx.font = '13px monospace';
  ctx.fillText(err.message, W / 2, H / 2 + 12);
  console.error(err);
});
</script>
</body>
</html>
