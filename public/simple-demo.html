let browser;

window.onload = function() {
  try {
    browser = new jsnes.Browser({
      container: document.getElementById("nes"),
      onError: function(e) {
        console.error(e);
        document.getElementById('status').innerHTML = 'Error: ' + e.message;
      }
    });

    // Load ROM from base64
    const romData = atob(SMB_ROM_BASE64);
    browser.loadROM(romData);

    document.getElementById('status').innerHTML = 'Game loaded. Arrow keys + X/Z';

  } catch (e) {
    console.error(e);
    document.getElementById('status').innerHTML = 'Failed to load: ' + e.message;
  }
};

function setPalette(theme) {
  if (!browser || !browser.nes) return;

  let bg, sprites;
  if (theme === 'underwater') {
    bg = [[15,17,28,44], [15,17,28,44], [15,17,28,44], [15,17,28,44]];
    sprites = [[15,22,18,33], [15,22,18,33], [15,22,18,33], [15,22,18,33]];
  } else if (theme === 'lava') {
    bg = [[15,6,22,39], [15,6,22,39], [15,6,22,39], [15,6,22,39]];
    sprites = [[15,6,22,39], [15,6,22,39], [15,6,22,39], [15,6,22,39]];
  } else if (theme === 'ice') {
    bg = [[32,49,31,48], [32,49,31,48], [32,49,31,48], [32,49,31,48]];
    sprites = [[32,17,31,49], [32,17,31,49], [32,17,31,49], [32,17,31,49]];
  } else if (theme === 'night') {
    bg = [[15,1,2,13], [15,1,2,13], [15,1,2,13], [15,1,2,13]];
    sprites = [[15,22,18,1], [15,22,18,1], [15,22,18,1], [15,22,18,1]];
  } else {
    bg = [[15,33,25,7], [15,33,25,7], [15,33,25,7], [15,33,25,7]];
    sprites = [[15,22,18,39], [15,22,18,39], [15,22,18,39], [15,22,18,39]];
  }

  // Access NES instance through browser.nes
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      browser.nes.ppu.vramMem[0x3F00 + i*4 + j] = bg[i][j];
      browser.nes.ppu.vramMem[0x3F10 + i*4 + j] = sprites[i][j];
    }
  }
}
